name: Appointment Reminders

# El scheduling productivo vive en pg_cron (Supabase, cada 5 min) desde
# junio 2026. Este workflow queda solo para disparo manual (testing)
# desde la pestaña Actions.
on:
  workflow_dispatch:

jobs:
  send-reminders:
    name: Send 24h + 2h appointment reminders
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call /api/cron/reminders
        run: |
          BASE_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          BASE_URL="${BASE_URL%/}"
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -L --location-trusted \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${BASE_URL}/api/cron/reminders")
          echo "HTTP $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" -ne 200 ]; then
            echo "Error: endpoint returned HTTP $STATUS"
            exit 1
          fi
