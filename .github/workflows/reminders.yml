name: WhatsApp Reminders

on:
  schedule:
    # Cada hora en punto (UTC)
    - cron: "0 * * * *"
  # Permite lanzarlo manualmente desde GitHub → Actions
  workflow_dispatch:

jobs:
  send-reminders:
    name: Send 24h appointment reminders
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call /api/cron/reminders
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/reminders")
          echo "HTTP $STATUS"
          cat /tmp/response.json
          if [ "$STATUS" -ne 200 ]; then
            echo "Error: endpoint returned HTTP $STATUS"
            exit 1
          fi
